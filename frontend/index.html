<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Google Craft PTP (Pre-Task Planning) safety audit assistant interactive application.">
    <title>Craft PTP Agent</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Persistent App Header -->
    <header class="app-header">
        <div class="logo-area">
            <div class="logo-symbol">G</div>
            <div class="title-stack">
                <h1>Craft PTP Agent</h1>
                <span class="site-tag">UNO3 Campus - Omaha, Nebraska</span>
            </div>
        </div>
        <button id="btn_reset">⟳ Reset Demo</button>
    </header>

    <!-- Main Content Layout -->
    <main class="app-main">
        <!-- Sidebar Control Dashboard (For Presenter/Crew simulation toggles) -->
        <aside class="sidebar-controls">
            <h2>Simulation Scenes</h2>
            <p class="sidebar-desc">Select the active stage to walk through continuous interactions during the daily
                shift.</p>
            <nav class="scene-nav">
                <button class="scene-btn active" id="scene-1-btn" data-scene="1">
                    <strong>Morning Huddle</strong>
                    <span>Plan generation & review</span>
                </button>
                <button class="scene-btn" id="scene-2-btn" data-scene="2" disabled>
                    <strong>SWAT-2</strong>
                    <span>Periodic Stop Work check</span>
                </button>
                <button class="scene-btn" id="scene-3-btn" data-scene="3">
                    <strong>End of Shift</strong>
                    <span>Plus/Delta Session</span>
                </button>
            </nav>
            <div class="system-log" id="activity-log">
                <h3>System Actions</h3>
                <ul id="log-list">
                    <li>Agent online at UNO3...</li>
                </ul>
            </div>
        </aside>

        <!-- Chat Core Layout -->
        <section class="chat-stage">
            <!-- Chat conversation messages -->
            <div class="chat-history" id="chat-window">
                <div id="chat-scene-1" class="scene-layer active"></div>
                <div id="chat-scene-2" class="scene-layer"></div>
                <div id="chat-scene-3" class="scene-layer"></div>
            </div>

            <!-- Interactive Input Bar -->
            <div class="chat-input-area">
                <div class="interactive-forms" id="interactive-forms">
                    <!-- Dynamic forms (like the Take Two checkbox) spawn here -->
                </div>
                <form id="message-form" class="message-form">
                    <textarea id="user-input" rows="2"
                        placeholder="Enter your construction tasks or request safety guidance..."
                        autocomplete="off"></textarea>
                    <button type="submit" id="send-btn">Send</button>
                </form>
                <div class="presenter-actions">
                    <button class="quick-btn" id="btn_cable_pull"></button>
                    <button class="quick-btn" id="btn_yes"></button>
                    <button class="quick-btn" id="btn_no"></button>
                    <button class="quick-btn" id="btn_new_members"></button>
                    <button class="quick-btn" id="btn_ready"></button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
